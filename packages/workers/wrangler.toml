name = "smb-crm-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
ENVIRONMENT = "development"
LOG_LEVEL = "info"

[[d1_databases]]
binding = "DB"
database_name = "smb-crm-db"
database_id = "${CLOUDFLARE_D1_DATABASE_ID}"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "smb-crm-storage"
